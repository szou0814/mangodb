<!DOCTYPE html>


<html>

  <head>

    <title> Pandemic Simulator Login </title>

    <!-- CUSTOM CSS -->
    <style>
      /* BACKGROUND */
      .bg {
        background-image: url("/static/images/bg.jpg");
        background-repeat: no-repeat;
        background-size: cover;

        width: 100vw;
        height: 100vh;

        filter: brightness(40%);

        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      body {
        color: white;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* ICON */
      .icon {
        height: 30vh;
        margin-top: clamp(40px, 5%, 5%);

        display: flex;
        align-items: center;
        justify-content: center;
      }

      .glow {
        border-radius: 20%;
        box-shadow: rgba(100, 100, 100, 0.8) 0 0 90px 33px;
      }

      /* HEADER */
      #header {
        color: #1b0000;
        text-shadow: 0 0 12px #800000, -1px -2px white;

        font-size: 400%;
        font-weight: bolder;
      }
    </style>

  </head>

  <body>

    <div class='bg'> </div>
    <div class='icon'>
      <img class="glow" src="/static/images/icon.png" style="height: 100%;
                                                              width: auto;"> </img>
    </div>

    <h2 style="margin-top: 2.5vh" id="header">Login</h2>

    Login to your existing account by entering your credentials.<br><br>
    If you do not already have an existing account, please register
    <a href="/register">here</a><br><br>

    <form method="POST">
      <input type="text" name="user_id" placeholder="Username" required> <br>
      <input type="password" name="password" placeholder="Password" required> <br><br>
      <input type="submit" name="sub1" value="Login">
    </form>

    {{ error }}

    <!-- TAILWIND -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  </body>

</html>
